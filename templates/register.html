<!DOCTYPE html>
<html>
<head>
    <title>Register | AI Recruitment</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #020617, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", sans-serif;
            color: #e5e7eb;
        }

        .register-card {
            background: #020617;
            padding: 40px;
            width: 380px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #1e293b;
            background: #0f172a;
            color: #e5e7eb;
            font-size: 14px;
        }

        input::placeholder {
            color: #64748b;
        }

        select option {
            background: #020617;
            color: #e5e7eb;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            background: linear-gradient(135deg, #22d3ee, #3b82f6);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .msg-success {
            color: #22c55e;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .msg-error {
            color: #f87171;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="register-card">

    <h2>📝 Register</h2>

    {% if message %}
        <div class="msg-success">{{ message }}</div>
    {% endif %}

    {% if error %}
        <div class="msg-error">{{ error }}</div>
    {% endif %}

    <!-- STEP 1 : SEND OTP -->
    {% if not otp_sent and not success %}
    <form method="post">
        <input type="hidden" name="action" value="send">

        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="role" required>
            <option value="">Select Role</option>
            <option value="candidate">Candidate</option>
            <option value="hr">HR</option>
        </select>

        <button type="submit">Send OTP</button>
    </form>
    {% endif %}

    <!-- STEP 2 : VERIFY OTP -->
    {% if otp_sent and not success %}
    <form method="post">
        <input type="hidden" name="action" value="verify">

        <input type="text" name="otp" placeholder="Enter OTP" required>

        <button type="submit">Verify OTP</button>
    </form>
    {% endif %}

    <!-- SUCCESS -->
    {% if success %}
        <div class="msg-success">
            🎉 Registration successful
        </div>

        <a href="/" style="
            display:block;
            text-align:center;
            margin-top:15px;
            color:#38bdf8;
            font-weight:600;
        ">
            Go to Login
        </a>
    {% endif %}

    <div class="back-link">
        <a href="/">← Back to Login</a>
    </div>

</div>

</body>
</html>
