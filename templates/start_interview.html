<!DOCTYPE html>
<html>
<head>
    <title>Mock Interview</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- 🔥 PAGE-ONLY CSS -->
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: #e5e7eb;
            font-family: "Segoe UI", sans-serif;
        }

        .interview-page {
            width: 100vw;
            min-height: 100vh;
            padding: 40px 80px;
            box-sizing: border-box;
        }

        .page-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .question-card label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e5e7eb;
        }

        .question-card textarea {
            width: 100%;
            min-height: 90px;
            background: #020617;
            border: 1px solid #1e293b;
            color: #e5e7eb;
            border-radius: 10px;
            padding: 12px;
            resize: none;
            font-size: 14px;
        }

        .question-card textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .submit-btn {
            display: block;
            margin: 40px auto 20px;
            width: 260px;
            padding: 12px;
            font-size: 16px;
            border-radius: 30px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            cursor: pointer;
        }

        .submit-btn:hover {
            transform: scale(1.05);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #38bdf8;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="interview-page">

    <h2 class="page-title">🎤 Mock Interview</h2>
    <p class="subtitle">Answer honestly — this helps you improve</p>

    <form method="POST">
        {% for q in questions %}
        <div class="question-card">
            <label>{{ loop.index }}. {{ q }}</label>
            <textarea name="answer_{{ loop.index0 }}"></textarea>
        </div>
        {% endfor %}

        <button class="submit-btn">Submit Interview</button>
    </form>

    <a href="/dashboard" class="back-link">← Back to Dashboard</a>

</div>

</body>
</html>
