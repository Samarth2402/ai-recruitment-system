<!DOCTYPE html>
<html>
<head>
    <title>Jobs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="page-full">
    <h2 class="page-title">Available Jobs</h2>

    <div class="jobs-grid">
        {% for job in jobs %}
        <div class="job-card-dark">
            <h3>{{ job.title }}</h3>
            <p><strong>Skills:</strong> {{ job.skills }}</p>

            <div class="job-inputs">
                <input type="text" placeholder="Experience (years)">
                <input type="text" placeholder="10th Percentage">
                <input type="text" placeholder="12th Percentage">
                <input type="text" placeholder="Graduation Percentage">
            </div>

            <button class="btn-primary">Apply</button>
        </div>
        {% endfor %}
    </div>

    <a href="/dashboard" class="back-link">← Back</a>
</div>
</body>
</html>
